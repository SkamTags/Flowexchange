<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowExchange - Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a href="./index.html" class="brand" aria-label="FlowExchange">
          <img
            class="brand-logo"
            src="./assets/flowexchange-mark-v2-clean.png"
            alt="FlowExchange"
          />
          <span class="brand-name">FlowExchange</span>
        </a>
        <nav class="nav-links" aria-label="Главная навигация">
          <a href="./index.html#exchange" data-i18n="navExchange">Обмен</a>
          <a href="./faq.html" data-i18n="navFaq">FAQ</a>
        </nav>
        <div class="nav-actions">
          <button class="lang-switch" id="langSwitch" type="button">RU</button>
          <a class="btn btn-ghost" href="./auth.html" data-i18n="navLogin">Войти</a>
          <a class="btn btn-primary" href="./auth.html" data-i18n="navRegister">Регистрация</a>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section class="container auth-grid">
        <article class="simple-card">
          <p class="eyebrow" data-i18n="authSignInEyebrow">Sign In</p>
          <h2 data-i18n="authSignInTitle">Вход в аккаунт</h2>
          <form class="auth-form" style="margin-top: 20px">
            <input type="email" data-i18n-placeholder="authEmailPlaceholder" placeholder="E-mail" />
            <input type="password" data-i18n-placeholder="authPasswordPlaceholder" placeholder="Пароль" />
            <button type="button" class="btn btn-primary full" data-i18n="authLoginBtn">Войти</button>
          </form>
        </article>
        <article class="simple-card">
          <p class="eyebrow" data-i18n="authRegisterEyebrow">Create Profile</p>
          <h2 data-i18n="authRegisterTitle">Создать аккаунт</h2>
          <form class="auth-form" style="margin-top: 20px">
            <input type="text" data-i18n-placeholder="authNamePlaceholder" placeholder="Имя" />
            <input type="email" data-i18n-placeholder="authEmailPlaceholder" placeholder="E-mail" />
            <input type="password" data-i18n-placeholder="authPasswordPlaceholder" placeholder="Пароль" />
            <button type="button" class="btn btn-ghost full" data-i18n="authRegisterBtn">Зарегистрироваться</button>
          </form>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
